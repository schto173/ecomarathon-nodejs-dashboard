services:
  eco-dashboard:
    build: .
    restart: unless-stopped
    networks:
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eco-dashboard.rule=Host(`eco-dashboard.tome.lu`)"
      - "traefik.http.routers.eco-dashboard.entrypoints=websecure"
      - "traefik.http.routers.eco-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.eco-dashboard.loadbalancer.server.port=80"

networks:
  traefik_default:
    external: true
